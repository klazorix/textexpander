name: Build

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact_name: macos-aarch64
            artifact_root: expandly-4.0.0/src-tauri/target/aarch64-apple-darwin/release/bundle
            artifact_path: expandly-4.0.0/src-tauri/target/aarch64-apple-darwin/release/bundle/**
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact_name: macos-x86_64
            artifact_root: expandly-4.0.0/src-tauri/target/x86_64-apple-darwin/release/bundle
            artifact_path: expandly-4.0.0/src-tauri/target/x86_64-apple-darwin/release/bundle/**
          - platform: ubuntu-22.04
            target: ''
            args: ''
            artifact_name: linux-x86_64
            artifact_root: expandly-4.0.0/src-tauri/target/release/bundle
            artifact_path: expandly-4.0.0/src-tauri/target/release/bundle/**
          - platform: windows-latest
            target: ''
            args: ''
            artifact_name: windows-x86_64
            artifact_root: expandly-4.0.0/src-tauri/target/release/bundle
            artifact_path: expandly-4.0.0/src-tauri/target/release/bundle/**

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: expandly-4.0.0/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./expandly-4.0.0/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libasound2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./expandly-4.0.0

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./expandly-4.0.0
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Write final job summary
        shell: pwsh
        run: |
          $target = if ('${{ matrix.target }}') { '${{ matrix.target }}' } else { 'native' }
          $root = '${{ matrix.artifact_root }}'
          $files = Get-ChildItem -Path $root -Recurse -File | Select-Object -First 12
          @"
          ## Build Job

          | Field | Value |
          | --- | --- |
          | Platform | ${{ matrix.platform }} |
          | Target | $target |
          | Artifact | ${{ matrix.artifact_name }} |
          | Current stage | Complete |

          ### Progress
          - [x] Checkout
          - [x] Tooling setup
          - [x] Dependencies installed
          - [x] Build complete
          - [x] Artifacts uploaded

          ### Bundle preview

          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          if ($files) {
            $files | ForEach-Object {
              "- $($_.FullName.Replace((Get-Location).Path + [IO.Path]::DirectorySeparatorChar, ''))"
            } | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          } else {
            "No bundle files found under $root." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }
          @"
          ### Uploaded artifact
          - ${{ matrix.artifact_name }}
          - Source path: ${{ matrix.artifact_path }}
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
