name: Build

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact_name: macos-aarch64
            artifact_path: expandly-4.0.0/src-tauri/target/aarch64-apple-darwin/release/bundle/**
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact_name: macos-x86_64
            artifact_path: expandly-4.0.0/src-tauri/target/x86_64-apple-darwin/release/bundle/**
          - platform: ubuntu-22.04
            target: ''
            args: ''
            artifact_name: linux-x86_64
            artifact_path: expandly-4.0.0/src-tauri/target/release/bundle/**
          - platform: windows-latest
            target: ''
            args: ''
            artifact_name: windows-x86_64
            artifact_path: expandly-4.0.0/src-tauri/target/release/bundle/**

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: expandly-4.0.0/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./expandly-4.0.0/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libasound2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./expandly-4.0.0

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./expandly-4.0.0
          args: ${{ matrix.args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
