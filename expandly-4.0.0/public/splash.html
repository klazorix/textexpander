<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expandly</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 400px;
      height: 200px;
      overflow: hidden;
      background: transparent;
    }

    .container {
      width: 400px;
      height: 200px;
      background: #161b27;
      border: 1px solid #1e2d45;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    img {
      width: 52px;
      height: 52px;
      border-radius: 10px;
    }

    h1 {
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3b82f6;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="splash_icon.png" alt="Expandly" />
    <h1>Expandly 4</h1>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>

</html>
