<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <defs>
    <image width="108" height="108" id="logo-alpha" href="data:image/png;base64,"/>
    <mask id="logo-mask" maskUnits="userSpaceOnUse" x="10" y="10" width="108" height="108">
      <rect width="128" height="128" fill="black"/>
      <use href="#logo-alpha" x="10" y="10"/>
    </mask>
  </defs>
  <rect width="128" height="128" fill="currentColor" mask="url(#logo-mask)"/>
</svg>
